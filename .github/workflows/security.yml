name: Security scan

# Weekly proactive scan: catches newly-disclosed CVEs in our deps even
# when no one has pushed code recently. Also available as a manual
# trigger so you can re-check after upgrading a package.
on:
  schedule:
    # Mondays 06:00 UTC. Feel free to tweak.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  backend-deps:
    name: backend deps (pip-audit + bandit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: pip-audit (full)
        # --strict fails the job if any vuln is found. The scheduled
        # workflow is the right place to be noisy - it opens an Actions
        # run you can eyeball weekly.
        run: pip-audit --strict

      - name: bandit (medium+ severity)
        run: bandit -r . -ll --exclude ./__pycache__

  frontend-deps:
    name: frontend deps (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

  mcp-server-deps:
    name: mcp-server deps (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci --omit=dev

      - name: npm audit (high+)
        run: npm audit --omit=dev --audit-level=high
