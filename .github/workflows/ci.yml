name: CI

# Run on every push to main and on every PR. Manual trigger is also wired
# up so you can re-run a red build without a commit.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel in-progress runs when new commits arrive on the same branch/PR.
# Keeps queue times tight on the free tier.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────
  # Backend: install deps, import every module, run pip-audit.
  # The imports are the real test here - db.py / auth_session.py /
  # gemini_service.py all validate required env vars at import time,
  # so a successful import proves the module tree is intact and the
  # config contract hasn't drifted.
  # ─────────────────────────────────────────────────────────────────
  backend:
    name: backend (python 3.12)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install runtime deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev tooling
        run: pip install -r requirements-dev.txt

      - name: Smoke-test imports
        # CI-only dummy values. Never match production secrets.
        # TOKEN_ENCRYPTION_KEY must be a valid Fernet key, so we mint
        # one on the fly instead of hard-coding garbage.
        env:
          SESSION_JWT_SECRET: ci-dummy-session-secret-not-used-in-prod
          GEMINI_API_KEY: ci-dummy-gemini-key
          GOOGLE_CLIENT_ID: ci-dummy
          GOOGLE_CLIENT_SECRET: ci-dummy
          GOOGLE_REDIRECT_URI: http://localhost/ci
          FRONTEND_BASE_URL: http://localhost
          DB_PATH: /tmp/ci-mailmind.db
          ENV: dev
        run: |
          export TOKEN_ENCRYPTION_KEY=$(python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())")
          python -c "import main"
          python -c "from routes import ai, auth, chat, emails"
          python -c "from services import gemini_service, mcp_service"
          python -c "import db, auth_session"

      - name: Byte-compile every module
        # Catches syntax errors in files the smoke-test doesn't explicitly
        # import (helpers, future routes, etc.).
        run: python -m compileall -q .

      - name: Dependency vulnerability audit (pip-audit)
        # Audits the real installed environment - picks up transitive
        # deps too. Does not fail the build on its own: CVE feeds are
        # noisy and you don't want a release blocked by a 3rd-party CVE
        # you can't immediately fix. Use the Actions summary to triage.
        continue-on-error: true
        run: pip-audit --strict || true

  # ─────────────────────────────────────────────────────────────────
  # Frontend: strict type-check. ESLint lives in lint.yml so style
  # failures don't mask real type regressions (and vice versa).
  # No `next build` because that would need NEXT_PUBLIC_* envs;
  # Vercel already builds on deploy.
  # ─────────────────────────────────────────────────────────────────
  frontend:
    name: frontend (node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps (reproducible)
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

  # ─────────────────────────────────────────────────────────────────
  # MCP server: super light - just make sure the Node source parses
  # and its deps install cleanly. (Real runtime lives inside the
  # backend container; this is a regression guard.)
  # ─────────────────────────────────────────────────────────────────
  mcp-server:
    name: mcp-server (node 20)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci --omit=dev

      - name: Parse-check index.js
        # `node --check` parses without executing - perfect for a stdio
        # server that would otherwise block waiting for a client.
        run: node --check index.js

      - name: npm audit (high+)
        continue-on-error: true
        run: npm audit --omit=dev --audit-level=high

  # ─────────────────────────────────────────────────────────────────
  # Security: scan the diff for leaked secrets (API keys, tokens,
  # refresh tokens, etc.). Runs on PRs and pushes to main.
  # ─────────────────────────────────────────────────────────────────
  secret-scan:
    name: secret scan (trufflehog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the full history so trufflehog can diff against the base.
          fetch-depth: 0

      - name: TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          # Only report verified hits (keys that actually authenticate to
          # the real service) to keep the signal-to-noise ratio high.
          extra_args: --only-verified
