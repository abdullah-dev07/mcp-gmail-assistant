# Mailmind — local stack.
#
#   docker compose up --build
#
# Frontend -> http://localhost:3000
# Backend  -> http://localhost:8001
#
# Secrets: backend/.env is read at runtime via `env_file`. It is NOT
# copied into the image (see root .dockerignore).
services:
  backend:
    build:
      # repo root as context so the image can see both backend/ and mcp-server/
      context: .
      dockerfile: backend/Dockerfile
    container_name: mailmind-backend
    env_file:
      - ./backend/.env
    environment:
      # Put the SQLite user-token DB on a named volume so it survives
      # `docker compose down`. Override DB_PATH in backend/.env if you
      # want it somewhere else; keep it under /data so the volume works.
      DB_PATH: /data/mailmind.db
    volumes:
      - mailmind-data:/data
    ports:
      - "8001:8001"
    restart: unless-stopped
    # Gemini + MCP are initialised at request time, so no deep healthcheck
    # is needed. Root `/` returns {"status":"running"} for a basic ping.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8001/', timeout=2).status==200 else sys.exit(1)"]
      interval: 15s
      timeout: 3s
      retries: 4
      start_period: 5s

  frontend:
    build:
      context: ./frontend
      # Build-time args are baked into the browser bundle. At runtime the
      # user's browser hits these values directly (not from inside Docker),
      # so localhost is correct for local dev.
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost:8001
        # Must match API_KEY in backend/.env. Read from host shell / .env so
        # it never ends up in version control.
        NEXT_PUBLIC_API_KEY: ${API_KEY-}
    container_name: mailmind-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

volumes:
  mailmind-data:
